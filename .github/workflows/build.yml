name: Build

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: macos
            esrgan_zip: realesrgan-ncnn-vulkan-v0.2.0-macos.zip
            esrgan_bin: realesrgan-ncnn-vulkan
          - os: windows-latest
            artifact: windows
            esrgan_zip: realesrgan-ncnn-vulkan-v0.2.0-windows.zip
            esrgan_bin: realesrgan-ncnn-vulkan.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r 源码/requirements.txt
          pip install pyinstaller

      - name: Download Real-ESRGAN binary
        run: |
          mkdir -p esrgan/models
          curl -L -o esrgan/esrgan.zip \
            "https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan/releases/download/v0.2.0/${{ matrix.esrgan_zip }}"
          unzip -o esrgan/esrgan.zip -d esrgan/
          chmod +x "esrgan/${{ matrix.esrgan_bin }}" || true
          # 将仓库中的模型复制过来
          cp -r 源码/models/* esrgan/models/
          ls -la esrgan/
          ls -la esrgan/models/

      - name: Build macOS app
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --name="照片智能修复工具" --windowed --onedir --noconfirm --clean \
            --add-binary="esrgan/${{ matrix.esrgan_bin }}:esrgan/" \
            --add-data="esrgan/models:esrgan/models" \
            源码/photo_restorer.py

      - name: Build Windows exe
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --name="照片智能修复工具" --windowed --onedir --noconfirm --clean `
            --add-binary="esrgan/${{ matrix.esrgan_bin }};esrgan/" `
            --add-data="esrgan/models;esrgan/models" `
            源码/photo_restorer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 照片智能修复工具-${{ matrix.artifact }}
          path: dist/