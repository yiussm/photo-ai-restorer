name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-13
            artifact: macos-x64
            esrgan_zip: realesrgan-ncnn-vulkan-v0.2.0-macos.zip
            esrgan_bin: realesrgan-ncnn-vulkan
          - os: macos-latest
            artifact: macos-arm64
            esrgan_zip: realesrgan-ncnn-vulkan-v0.2.0-macos.zip
            esrgan_bin: realesrgan-ncnn-vulkan
          - os: windows-latest
            artifact: windows
            esrgan_zip: realesrgan-ncnn-vulkan-v0.2.0-windows.zip
            esrgan_bin: realesrgan-ncnn-vulkan.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r 源码/requirements.txt
          pip install pyinstaller

      - name: Download Real-ESRGAN binary
        shell: bash
        run: |
          mkdir -p esrgan/models
          curl -L -o esrgan/esrgan.zip \
            "https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan/releases/download/v0.2.0/${{ matrix.esrgan_zip }}"
          unzip -o esrgan/esrgan.zip -d esrgan/
          find esrgan -name "${{ matrix.esrgan_bin }}" -not -path "esrgan/${{ matrix.esrgan_bin }}" -exec mv {} esrgan/ \; || true
          chmod +x "esrgan/${{ matrix.esrgan_bin }}" || true
          cp -r 源码/models/* esrgan/models/

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: |
          pyinstaller --name="照片智能修复工具" --windowed --onedir --noconfirm --clean \
            --add-binary="esrgan/${{ matrix.esrgan_bin }}:esrgan/" \
            --add-data="esrgan/models:esrgan/models" \
            源码/photo_restorer.py
          cd dist && zip -r "../photo-ai-restorer-${{ matrix.artifact }}.zip" "照片智能修复工具.app"

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name="照片智能修复工具" --windowed --onedir --noconfirm --clean `
            --add-binary="esrgan/${{ matrix.esrgan_bin }};esrgan/" `
            --add-data="esrgan/models;esrgan/models" `
            源码/photo_restorer.py
          Compress-Archive -Path "dist/照片智能修复工具/*" -DestinationPath "photo-ai-restorer-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-ai-restorer-${{ matrix.artifact }}
          path: |
            photo-ai-restorer-${{ matrix.artifact }}.zip
            photo-ai-restorer-windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: photo-ai-restorer-*
          path: release-assets

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          echo "## 📝 更新内容" > /tmp/notes.md
          echo "" >> /tmp/notes.md
          git log $RANGE --pretty=format:"- %s (%h)" --no-merges >> /tmp/notes.md || echo "- 初始版本" >> /tmp/notes.md
          echo "" >> /tmp/notes.md
          echo "---" >> /tmp/notes.md
          echo "**构建时间:** $(date '+%Y-%m-%d %H:%M')" >> /tmp/notes.md
          cat /tmp/notes.md
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 照片智能修复工具 - 最新版
          body: ${{ steps.notes.outputs.body }}
          files: release-assets/*/*.zip
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
